<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" fill="none">
  <defs>
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F7941D"/>
      <stop offset="25%" stop-color="#ED1C24"/>
      <stop offset="50%" stop-color="#8E44AD"/>
      <stop offset="75%" stop-color="#2980B9"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <filter id="pill-shadow" x="-8%" y="-15%" width="116%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
    <filter id="icon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Gear icon top center -->
  <g transform="translate(480, 28)" text-anchor="middle">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#bbb" stroke-width="1.5"/>
    <path d="M0,-14 L2,-5 L10,-9 L6,-1 L14,3 L5,4 L6,13 L0,7 L-6,13 L-5,4 L-14,3 L-6,-1 L-10,-9 L-2,-5 Z" fill="#bbb" opacity="0.5" transform="scale(0.85)"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#bbb" stroke-width="1.5"/>
  </g>

  <!-- S-Curve Path -->
  <path d="M145,120 C260,120 320,120 480,120 C640,120 700,120 815,120
           C890,120 920,160 880,200
           C840,240 760,265 640,265 C520,265 440,265 320,265"
        stroke="url(#pathGrad)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Small dot connectors on path -->
  <circle cx="145" cy="120" r="5" fill="#F7941D" opacity="0.4"/>
  <circle cx="480" cy="120" r="5" fill="#ED1C24" opacity="0.4"/>
  <circle cx="815" cy="120" r="5" fill="#8E44AD" opacity="0.4"/>
  <circle cx="640" cy="265" r="5" fill="#2980B9" opacity="0.4"/>
  <circle cx="320" cy="265" r="5" fill="#27AE60" opacity="0.4"/>

  <!-- ===== ROW 1: 3 Pills ===== -->

  <!-- Pill 1: Gap Analysis -->
  <g filter="url(#pill-shadow)">
    <rect x="48" y="90" width="200" height="60" rx="30" fill="white" stroke="#E8E8E8" stroke-width="1.5"/>
    <circle cx="82" cy="120" r="22" fill="url(#grad1)" filter="url(#icon-glow)"/>
    <!-- Search icon -->
    <g transform="translate(82,120)" fill="white">
      <circle cx="-3" cy="-3" r="7" fill="none" stroke="white" stroke-width="2"/>
      <line x1="2" y1="2" x2="7" y2="7" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="118" y="125" font-family="Arial, sans-serif" font-size="14.5" font-weight="600" fill="#333">Gap Analysis</text>
  </g>
  <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#F7941D"/>
    <stop offset="100%" stop-color="#FFBA5C"/>
  </linearGradient>

  <!-- Pill 2: Documentation -->
  <g filter="url(#pill-shadow)">
    <rect x="378" y="90" width="210" height="60" rx="30" fill="white" stroke="#E8E8E8" stroke-width="1.5"/>
    <circle cx="412" cy="120" r="22" fill="url(#grad2)" filter="url(#icon-glow)"/>
    <!-- Document icon -->
    <g transform="translate(412,120)" fill="white">
      <rect x="-7" y="-9" width="14" height="18" rx="2" fill="none" stroke="white" stroke-width="1.8"/>
      <line x1="-4" y1="-4" x2="4" y2="-4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-4" y1="4" x2="2" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="448" y="125" font-family="Arial, sans-serif" font-size="14.5" font-weight="600" fill="#333">Documentation</text>
  </g>
  <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ED1C24"/>
    <stop offset="100%" stop-color="#FF6B6B"/>
  </linearGradient>

  <!-- Pill 3: Implementation -->
  <g filter="url(#pill-shadow)">
    <rect x="710" y="90" width="218" height="60" rx="30" fill="white" stroke="#E8E8E8" stroke-width="1.5"/>
    <circle cx="744" cy="120" r="22" fill="url(#grad3)" filter="url(#icon-glow)"/>
    <!-- Cog/gear icon -->
    <g transform="translate(744,120)" fill="white">
      <circle cx="0" cy="0" r="4" fill="none" stroke="white" stroke-width="1.8"/>
      <g stroke="white" stroke-width="2.2" stroke-linecap="round">
        <line x1="0" y1="-9" x2="0" y2="-6"/><line x1="0" y1="6" x2="0" y2="9"/>
        <line x1="-9" y1="0" x2="-6" y2="0"/><line x1="6" y1="0" x2="9" y2="0"/>
        <line x1="-6.4" y1="-6.4" x2="-4.2" y2="-4.2"/><line x1="4.2" y1="4.2" x2="6.4" y2="6.4"/>
        <line x1="6.4" y1="-6.4" x2="4.2" y2="-4.2"/><line x1="-4.2" y1="4.2" x2="-6.4" y2="6.4"/>
      </g>
    </g>
    <text x="780" y="125" font-family="Arial, sans-serif" font-size="14.5" font-weight="600" fill="#333">Implementation</text>
  </g>
  <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#8E44AD"/>
    <stop offset="100%" stop-color="#BB6BD9"/>
  </linearGradient>

  <!-- ===== ROW 2: 2 Pills ===== -->

  <!-- Pill 4: Internal Auditing -->
  <g filter="url(#pill-shadow)">
    <rect x="510" y="235" width="228" height="60" rx="30" fill="white" stroke="#E8E8E8" stroke-width="1.5"/>
    <circle cx="544" cy="265" r="22" fill="url(#grad4)" filter="url(#icon-glow)"/>
    <!-- Clipboard check icon -->
    <g transform="translate(544,265)" fill="white">
      <rect x="-7" y="-9" width="14" height="18" rx="2" fill="none" stroke="white" stroke-width="1.8"/>
      <polyline points="-4,0 -1,3 5,-4" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="580" y="270" font-family="Arial, sans-serif" font-size="14.5" font-weight="600" fill="#333">Internal Auditing</text>
  </g>
  <linearGradient id="grad4" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2980B9"/>
    <stop offset="100%" stop-color="#5DADE2"/>
  </linearGradient>

  <!-- Pill 5: Certification Audit -->
  <g filter="url(#pill-shadow)">
    <rect x="195" y="235" width="240" height="60" rx="30" fill="white" stroke="#E8E8E8" stroke-width="1.5"/>
    <circle cx="229" cy="265" r="22" fill="url(#grad5)" filter="url(#icon-glow)"/>
    <!-- Certificate/award icon -->
    <g transform="translate(229,265)" fill="white">
      <circle cx="0" cy="-3" r="7" fill="none" stroke="white" stroke-width="1.8"/>
      <polyline points="-4,4 -5,11 0,8 5,11 4,4" fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round"/>
    </g>
    <text x="265" y="270" font-family="Arial, sans-serif" font-size="14.5" font-weight="600" fill="#333">Certification Audit</text>
  </g>
  <linearGradient id="grad5" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#27AE60"/>
    <stop offset="100%" stop-color="#6FCF97"/>
  </linearGradient>

  <!-- Decorative small dots along the path -->
  <circle cx="300" cy="120" r="3" fill="#F0614A" opacity="0.3"/>
  <circle cx="650" cy="120" r="3" fill="#7B1FA2" opacity="0.3"/>
  <circle cx="860" cy="155" r="3" fill="#9B59B6" opacity="0.3"/>
  <circle cx="750" cy="245" r="3" fill="#2980B9" opacity="0.3"/>
  <circle cx="460" cy="265" r="3" fill="#27AE60" opacity="0.3"/>

</svg>
